# Code generated by ios-app-manager.
# Adjust rules as needed for your project.

included:
  - Targets/
  - Packages/

excluded:
  - Derived/
  - DerivedData/
  - "*.generated.swift"
  - Tuist/Dependencies/

disabled_rules:
  - todo
  - large_tuple
  - cyclomatic_complexity
  - function_body_length
  - type_body_length
  - file_length

opt_in_rules:
  - empty_count
  - empty_string
  - force_unwrapping

line_length:
  warning: 160
  error: 180
  ignores_comments: true

reporter: "xcode"
